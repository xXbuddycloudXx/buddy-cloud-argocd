apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "86.3.2"
    helm:
      values: |
        prometheus:
          prometheusSpec:
            retention: 7d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
        grafana:
          persistence:
            enabled: true
            storageClassName: local-path
            size: 2Gi
          sidecar:
            datasources:
              defaultDatasourceEnabled: true
          additionalDataSources: []
          envFromSecrets:
            - name: grafana-github-oauth
          grafana.ini:
            server:
              root_url: http://andrew-bc-1.sugarglider-moth.ts.net/grafana
              serve_from_sub_path: true
            auth.github:
              enabled: true
              client_id: $__env{GF_AUTH_GITHUB_CLIENT_ID}
              client_secret: $__env{GF_AUTH_GITHUB_CLIENT_SECRET}
              allowed_organizations: xXbuddycloudXx
              allow_sign_up: true
              scopes: user:email,read:org
              role_attribute_path: "contains(groups[*], '@xXbuddycloudXx/buddies') && 'Editor' || 'Viewer'"
        alertmanager:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
