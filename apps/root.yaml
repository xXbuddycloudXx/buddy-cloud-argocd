apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/xXbuddycloudXx/buddy-cloud-argocd.git
      targetRevision: HEAD
      path: apps
    - repoURL: https://github.com/xXbuddycloudXx/buddy-cloud-argocd.git
      targetRevision: HEAD
      path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
